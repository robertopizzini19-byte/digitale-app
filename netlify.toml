# digITAle — Netlify deploy config
# Static export Next.js 16 -> cartella /out servita da Netlify CDN.
# Niente plugin @netlify/plugin-nextjs: non serve (no SSR/ISR).

[build]
  command = "npm run build"
  publish = "out"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"
  # BREVO_API_KEY — setta in Netlify UI: Site > Environment variables
  # DIGITALE_FN_SECRET — secret anti-spam per le Netlify Functions (genera random 32 char)

# ============================================================================
# CONTEXTS — ambienti separati: production / staging / deploy-preview / branch
# Env vars specifiche si settano in Netlify UI -> Site > Environment variables
# scegliendo il context di appartenenza.
# ============================================================================

[context.production]
  command = "npm run build"
  [context.production.environment]
    NEXT_PUBLIC_APP_ENV = "production"
    NEXT_PUBLIC_APP_URL = "https://digitale-italia.netlify.app"

[context.staging]
  command = "npm run build"
  [context.staging.environment]
    NEXT_PUBLIC_APP_ENV = "staging"
    NEXT_PUBLIC_APP_URL = "https://staging--digitale-italia.netlify.app"

[context.deploy-preview]
  command = "npm run build"
  [context.deploy-preview.environment]
    NEXT_PUBLIC_APP_ENV = "preview"

[context.branch-deploy]
  command = "npm run build"
  [context.branch-deploy.environment]
    NEXT_PUBLIC_APP_ENV = "branch"

# ============================================================================
# SECURITY HEADERS — Blindatura perimetro.
# Applicati a tutte le route. Obiettivo: A+ su securityheaders.com.
# ============================================================================

[[headers]]
  for = "/*"
  [headers.values]
    # XSS / clickjacking / MIME sniffing
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"

    # HTTPS forzato per 2 anni + includeSubDomains + preload-ready
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Permissions: disabilito tutto tranne quello che ci serve
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=(self), usb=(), magnetometer=(), gyroscope=()"

    # CSP — Content Security Policy (Sentry eu.sentry.io in connect-src per observability)
    # - default-src 'self': niente caricamenti da esterni se non esplicitati
    # - script-src: 'self' + 'unsafe-inline' (React hydration) per ora, stringere con nonces in futuro
    # - connect-src: self + Supabase (wildcard *.supabase.co/*.supabase.in per WSS realtime) + Sentry EU
    # - img-src: self + data: (inline SVG) + blob: (avatar upload) + https: (Gravatar/similari)
    # - font-src: self + Google Fonts (usiamo Inter via next/font, che inline)
    # - frame-ancestors none: no iframe embedding di digITAle
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.supabase.in https://*.ingest.eu.sentry.io https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com; object-src 'none'; upgrade-insecure-requests"

# Staging / preview: X-Robots-Tag noindex + basic auth via Netlify UI
[[context.staging.headers]]
  for = "/*"
  [context.staging.headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[context.deploy-preview.headers]]
  for = "/*"
  [context.deploy-preview.headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[context.branch-deploy.headers]]
  for = "/*"
  [context.branch-deploy.headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

# Asset statici con cache lunghissima (immutabili, hash nel nome)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Redirects
[[redirects]]
  from = "/login"
  to = "/accedi"
  status = 301

[[redirects]]
  from = "/signup"
  to = "/registrati"
  status = 301

[[redirects]]
  from = "/register"
  to = "/registrati"
  status = 301
